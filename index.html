<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ironman Countdown</title>
  <meta name="theme-color" content="#07111f" />
  <meta name="description" content="A countdown app for race day." />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./service-worker.js");
      });
    }
  </script>
  <style>
    :root {
      --bg1: #07111f;
      --bg2: #0a2340;
      --bg3: #0a5a73;
      --panel: rgba(255,255,255,0.10);
      --panel-border: rgba(255,255,255,0.14);
      --text: #f8fbff;
      --muted: rgba(248,251,255,0.75);
      --accent: #76e4f7;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: var(--text);
      background: linear-gradient(135deg, var(--bg1), var(--bg2), var(--bg3));
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .app {
      width: min(980px, 100%);
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(14px);
      border: 1px solid var(--panel-border);
      border-radius: 32px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.30);
      padding: 24px;
    }

    .header {
      text-align: center;
      margin-bottom: 24px;
    }

    .eyebrow {
      letter-spacing: 0.28em;
      text-transform: uppercase;
      font-size: 12px;
      color: var(--accent);
      margin-bottom: 10px;
      font-weight: 700;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 6vw, 4rem);
      line-height: 1;
    }

    .date {
      margin-top: 14px;
      color: var(--muted);
      font-size: clamp(1rem, 2.5vw, 1.2rem);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin: 24px 0;
    }

    .tile {
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 24px;
      padding: 22px 10px;
      text-align: center;
      min-height: 130px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .value {
      font-size: clamp(2.2rem, 7vw, 4.2rem);
      font-weight: 800;
      font-variant-numeric: tabular-nums;
    }

    .label {
      margin-top: 8px;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      font-size: 0.76rem;
      color: var(--muted);
      font-weight: 700;
    }

    .footer {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-top: 10px;
    }

    .sport {
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 22px;
      padding: 18px 14px;
      text-align: center;
    }

    .sport-icon {
      font-size: 28px;
      display: block;
      margin-bottom: 8px;
    }

    .sport-name {
      font-weight: 700;
    }

    .message {
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 28px;
      padding: 26px;
      text-align: center;
      font-size: clamp(1.2rem, 4vw, 2rem);
      font-weight: 800;
    }

    .submessage {
      display: block;
      margin-top: 10px;
      font-size: 1rem;
      font-weight: 500;
      color: var(--muted);
    }

    @media (max-width: 720px) {
      .app { padding: 18px; border-radius: 24px; }
      .grid { grid-template-columns: repeat(2, 1fr); }
      .footer { grid-template-columns: 1fr; }
      .tile { min-height: 112px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="header">
      <div class="eyebrow">Countdown App</div>
      <h1>Ironman Race Day</h1>
      <div id="raceDate" class="date"></div>
    </section>

    <section id="countdownGrid" class="grid">
      <div class="tile"><div id="days" class="value">0</div><div class="label">Days</div></div>
      <div class="tile"><div id="hours" class="value">0</div><div class="label">Hours</div></div>
      <div class="tile"><div id="minutes" class="value">0</div><div class="label">Minutes</div></div>
      <div class="tile"><div id="seconds" class="value">0</div><div class="label">Seconds</div></div>
    </section>

    <section id="doneMessage" class="message" hidden>
      Race Day Is Here
      <span class="submessage">You made it. Trust your training.</span>
    </section>

    <section class="footer">
      <div class="sport"><span class="sport-icon">🏊</span><div class="sport-name">Swim</div></div>
      <div class="sport"><span class="sport-icon">🚴</span><div class="sport-name">Bike</div></div>
      <div class="sport"><span class="sport-icon">🏃</span><div class="sport-name">Run</div></div>
    </section>
  </main>

  <script>
    const targetDate = new Date("2027-03-06T07:00:00");

    document.getElementById("raceDate").textContent =
      targetDate.toLocaleDateString("en-NZ", {
        weekday: "long",
        day: "numeric",
        month: "long",
        year: "numeric"
      });

    function updateCountdown() {
      const now = new Date();
      const diff = targetDate - now;

      if (diff <= 0) {
        document.getElementById("countdownGrid").hidden = true;
        document.getElementById("doneMessage").hidden = false;
        return;
      }

      const days = Math.floor(diff / (1000 * 60 * 60 * 24));
      const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
      const minutes = Math.floor((diff / (1000 * 60)) % 60);
      const seconds = Math.floor((diff / 1000) % 60);

      document.getElementById("days").textContent = days;
      document.getElementById("hours").textContent = hours;
      document.getElementById("minutes").textContent = minutes;
      document.getElementById("seconds").textContent = seconds;
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);
  </script>
</body>
</html>
